<!doctype html>
<html>
<head>
  <title>Go Remote Shell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background-color: #f0f0f0; }
    .controls { padding: 10px; background-color: #ddd; display: flex; gap: 10px; align-items: center; }
    .controls input { padding: 5px; }
    .controls button { padding: 5px 10px; }
    #terminal-container { flex-grow: 1; padding: 10px; background-color: #000; }
    #terminal { height: 100%; width: 100%; }
  </style>
</head>
<body>
<div class="controls">
  <label for="clientId">Client ID:</label>
  <input type="text" id="clientId" value="golang-client-1">
  <label for="username">Username:</label>
  <input type="text" id="username" value="" placeholder="留空则为 agent 默认用户">
  <button id="connectBtn">连接</button>
  <button id="disconnectBtn" disabled>断开连接</button>
</div>
<div id="terminal-container">
  <div id="terminal"></div>
</div>

<script>
  const term = new Terminal({ cursorBlink: true, fontFamily: 'monospace', fontSize: 14 });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();
  window.onresize = () => fitAddon.fit();

  const clientIdInput = document.getElementById('clientId');
  const usernameInput = document.getElementById('username');
  const connectBtn = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');

  let socket = null;
  // 1. 声明一个变量来持有 onData 监听器的 disposable 对象
  let onDataDisposable = null;

  function connect() {
    if (socket) {
      socket.close();
    }

    const clientId = clientIdInput.value.trim();
    const username = usernameInput.value.trim();
    if (!clientId) {
      alert('Client ID 不能为空');
      return;
    }

    term.reset();
    term.writeln('正在连接...');

    const protocol = (window.location.protocol === 'https:') ? 'wss://' : 'ws://';
    let wsUrl = `${protocol}${window.location.host}/ws?type=ui&clientId=${encodeURIComponent(clientId)}`;
    if (username) {
      wsUrl += `&user=${encodeURIComponent(username)}`;
    }

    socket = new WebSocket(wsUrl);

    socket.onopen = () => {
      term.writeln(`\x1b[32m连接成功 (Client ID: ${clientId}, User: ${username || 'default'})\x1b[0m`);
      fitAddon.fit();
      sendResize();
      connectBtn.disabled = true;
      disconnectBtn.disabled = false;
    };

    socket.onclose = (event) => {
      term.writeln(`\x1b[31m\r\n连接已断开。 Code: ${event.code}\x1b[0m`);
      socket = null;
      connectBtn.disabled = false;
      disconnectBtn.disabled = true;
    };

    socket.onmessage = async (event) => {
      if (event.data instanceof Blob) {
        const data = new Uint8Array(await event.data.arrayBuffer());
        term.write(data);
      } else if (typeof event.data === 'string') {
        term.writeln('\r\n' + event.data);
      } else {
        console.warn('收到未知类型的 WebSocket 消息:', event.data);
      }
    };

    // 2. 在添加新的 onData 监听器之前，先销毁旧的（如果存在）
    if (onDataDisposable) {
      onDataDisposable.dispose();
    }

    // 3. 将新的 disposable 对象保存起来，并只在 socket 真正打开时发送数据
    onDataDisposable = term.onData((data) => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(data);
      }
    });
  }

  function disconnect() {
    if (socket) {
      socket.close();
    }
  }

  function sendResize() {
    if (socket && socket.readyState === WebSocket.OPEN) {
      const resizeMsg = { cols: term.cols, rows: term.rows };
      socket.send(JSON.stringify(resizeMsg));
    }
  }

  term.onResize(sendResize);
  connectBtn.addEventListener('click', connect);
  disconnectBtn.addEventListener('click', disconnect);
</script>
</body>
</html>
